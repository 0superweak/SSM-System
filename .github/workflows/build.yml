name: Build SSM Application

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "SSM_Student_System" --add-data "assets;assets" app.py

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SSM_Windows_Executable
        path: dist/SSM_Student_System.exe
